[flake8]
max-line-length = 79
max-complexity = 5

# WPS strict limits
max-returns = 3
max-arguments = 4
max-methods = 7
max-local-variables = 5
max-expressions = 9
max-module-members = 10
max-imports = 12
max-cognitive-score = 12
max-string-usages = 3
max-conditions = 4

# Minimise noqa suppression — 1 is the lowest allowed value
max-noqa-comments = 1
noqa-require-code = true

per-file-ignores =
    **/migrations/*.py: WPS, E501, RUF

# Exclude virtual envs, caches
extend-exclude =
    .venv,
    **/migrations/*,
    venv,
    env,
    __pycache__,
    build,
    dist,
    .git,
    *.egg-info
